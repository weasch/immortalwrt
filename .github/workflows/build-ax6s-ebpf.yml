name: Build AX6S ImmortalWrt (Fork) Native eBPF

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Your Forked Source
      uses: actions/checkout@v4

    - name: Initialize Compilation Environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get -qq update
        sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-setuptools rsync unzip zlib1g-dev file wget upx-ucl
        sudo bash -c 'bash <(curl -s https://build-scripts.immortalwrt.org/init_build_environment.sh)' || true
        
    - name: Update And Install Feeds
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Configure Network and Kernel for eBPF
      run: |
        # 将默认后台 IP 修改为 192.168.9.1
        sed -i 's/192.168.1.1/192.168.9.1/g' package/base-files/files/bin/config_generate
        
        # 写入定制配置单
        cat << 'EOF' > .config
        # 【机型锁定】红米 AX6S
        CONFIG_TARGET_mediatek=y
        CONFIG_TARGET_mediatek_mt7622=y
        CONFIG_TARGET_mediatek_mt7622_DEVICE_xiaomi_redmi-router-ax6s=y
        
        # 【基础 UI 与全中文支持】
        CONFIG_PACKAGE_luci=y
        CONFIG_PACKAGE_luci-base=y
        CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
        CONFIG_PACKAGE_luci-compat=y
        # CONFIG_LUCI_LANG_en is not set
        
        # 【核心黑科技：满血原生 eBPF 与 BTF 内核支持】
        CONFIG_DEVEL=y
        CONFIG_KERNEL_DEBUG_INFO=y
        CONFIG_KERNEL_DEBUG_INFO_BTF=y
        CONFIG_KERNEL_BPF_EVENTS=y
        CONFIG_KERNEL_CGROUP_BPF=y
        
        # 【eBPF 流量拦截必需的底层内核模块】
        CONFIG_PACKAGE_kmod-bpf=y
        CONFIG_PACKAGE_kmod-xdp=y
        CONFIG_PACKAGE_tc-full=y
        CONFIG_PACKAGE_kmod-sched-bpf=y
        CONFIG_PACKAGE_kmod-sched-core=y
        
        # 【daed 手动部署所需的系统环境包】
        CONFIG_PACKAGE_curl=y
        CONFIG_PACKAGE_ca-bundle=y
        CONFIG_PACKAGE_ca-certificates=y
        CONFIG_PACKAGE_ip-full=y
        CONFIG_PACKAGE_kmod-tun=y
        CONFIG_PACKAGE_iptables-mod-tproxy=y
        CONFIG_PACKAGE_kmod-ipt-tproxy=y
        
        # 开启 Strip 优化体积
        CONFIG_STRIP=y
        EOF
        
        # 执行依赖链推导
        make defconfig

    - name: Early Warning Audit Radar
      run: |
        # 【5分钟自检雷达】如果系统不认 AX6S 这个代号（导致回退为默认机型），立刻熔断自杀，绝不浪费 40 分钟
        ERR=0
        grep -q "CONFIG_TARGET_mediatek=y" .config && echo "✓ 底层架构锁定成功" || { echo "❌ 错误: 机型被重置！"; ERR=1; }
        grep -q "CONFIG_KERNEL_DEBUG_INFO_BTF=y" .config && echo "✓ BTF eBPF 支持锁定成功" || { echo "❌ 错误: eBPF 被剔除！"; ERR=1; }
        
        if [ $ERR -eq 1 ]; then
          echo "=== ❌ 审计未通过！说明你 Fork 的分支机型代号有变，已为你前置熔断！ ==="
          exit 1
        else
          echo "=== 🎉 机型与 eBPF 内核地基稳如磐石，开启高速编译！ ==="
        fi

    - name: Download Packages
      run: |
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile Custom Firmware
      run: |
        echo -e "$(nproc) thread compile"
        # 启动全速编译
        make -j$(nproc) || make -j1 V=s

    - name: Print Firmware Directory Structure
      run: |
        # 【侦察兵】在上传前，打印所有的编译产物，让你清楚地看到固件被藏在了哪里！
        echo "=== 正在扫描生成的固件目录 ==="
        ls -lhR bin/targets/

    - name: Upload Finished Firmware
      uses: actions/upload-artifact@v4
      with:
        name: ImmortalWrt_AX6S_Fork_Native_eBPF
        # 【天罗地网】不要去猜路径和后缀，直接用双星号拦截 targets 目录下生成的所有 bin 和 itb 文件！
        path: |
          bin/targets/**/*.bin
          bin/targets/**/*.itb
