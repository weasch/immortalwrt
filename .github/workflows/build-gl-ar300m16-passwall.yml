name: Build GL-AR300M16 PassWall Master

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get -qq update
        # 强装宿主机工具链（确保支持 UPX 压缩与基本编译）
        sudo apt-get install -y build-essential gawk rsync unzip upx-ucl
        # 调用官方环境自适应部署脚本
        sudo bash -c 'bash <(curl -s https://build-scripts.immortalwrt.org/init_build_environment.sh)'

    - name: Inject PassWall 2 Feed Sources
      run: |
        # 锁死稳定主线 ;main 分支，隔绝未来源码变动引发的突发性编译冲突
        echo "src-git passwall https://github.com/xiaorouji/openwrt-passwall;main" >> feeds.conf.default
        echo "src-git passwall_packages https://github.com/xiaorouji/openwrt-passwall-packages;main" >> feeds.conf.default

    - name: Update & Install Feeds
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Fail-Proof Default LAN IP Customization
      run: |
        # 【物理开机锁】确保 procd 100% 强效执行网段改写，开机即用 192.168.9.1
        echo "=== 正在通过 uci-defaults 机制锁死 192.168.9.1 网段 ==="
        mkdir -p package/base-files/files/etc/uci-defaults
        cat << 'EOF' > package/base-files/files/etc/uci-defaults/99-custom-lan-ip
        #!/bin/sh
        uci set network.lan.ipaddr='192.168.9.1'
        uci commit network
        exit 0
        EOF
        chmod +x package/base-files/files/etc/uci-defaults/99-custom-lan-ip

    - name: Generate Configuration File
      run: |
        cat <<EOF > .config
        # 【机型锁定】精准定位 GL.iNet GL-AR300M 16M NOR 闪存专属 Profile 代号
        CONFIG_TARGET_ath79=y
        CONFIG_TARGET_ath79_generic=y
        CONFIG_TARGET_ath79_generic_DEVICE_glinet_gl-ar300m=y

        # 【16M 容量极致压榨】只留纯净中文后台，斩断一切多余臃肿体积
        CONFIG_PACKAGE_luci=y
        CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
        CONFIG_LUCI_LANG_en=n

        # 【轻量代理归位】选定 PassWall 2 及其全中文交互界面
        CONFIG_PACKAGE_luci-app-passwall=y
        CONFIG_PACKAGE_luci-i18n-passwall-zh-cn=y

        # 【精简核心策略】锁死唯一精简版 Xray 核心
        CONFIG_PACKAGE_Xray-core=y
        CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Xray=y
        
        # 【第①轮审计核弹补丁：开启 Xray 核心 UPX 极致压缩，体积原地暴砍 60%】
        CONFIG_XRAY_CORE_COMPRESS_UPX=y

        # 【第④轮审计核心召回：国内防污染智能分流神器（纯C轻量化大件）】
        CONFIG_PACKAGE_chinadns-ng=y
        CONFIG_PACKAGE_luci-app-passwall_INCLUDE_ChinaDNS_NG=y

        # 【严格截杀体积地雷：斩断所有额外重负载核心与数MB大小的官方数据库】
        # CONFIG_PACKAGE_luci-app-passwall_INCLUDE_sing-box is not set
        # CONFIG_PACKAGE_luci-app-passwall_INCLUDE_V2ray is not set
        # CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Trojan_Plus is not set
        # CONFIG_PACKAGE_luci-app-passwall_INCLUDE_NaiveProxy is not set
        # CONFIG_PACKAGE_v2ray-geoip is not set
        # CONFIG_PACKAGE_v2ray-geosite is not set
        # CONFIG_PACKAGE_xray-geoview is not set
        # CONFIG_PACKAGE_haproxy is not set
        # CONFIG_PACKAGE_brook is not set
        # CONFIG_PACKAGE_kcptun is not set

        # 【高级劫持平替组件前置锁死】
        CONFIG_PACKAGE_dnsmasq-full=y
        # CONFIG_PACKAGE_dnsmasq is not set
        CONFIG_PACKAGE_ipset=y
        CONFIG_PACKAGE_kmod-ipt-ipset=y

        # 【全局终极空间优化】强制剔除所有调试符号
        CONFIG_STRIP=y
        EOF
        
        # 第一轮基础依赖推导
        make defconfig
        
        # 【双层网段锁死】双保险无损改写，将可能残留的 1.1 彻底篡改为 9.1
        sed -i 's/192.168.1.1/192.168.9.1/g' .config
        sed -i 's/192.168.1.1/192.168.9.1/g' package/base-files/files/bin/config_generate
        
        # 二轮终极锁定推导
        make defconfig

    - name: Ultimate Multi-Verification Radar (5-Min Early Warning)
      run: |
        # 【10重精密自检雷达】少打包任何一件大件、或有体积爆仓隐患，在此光速自杀，绝不浪费生命！
        echo "=== 🕵️‍♂️ 正在启动国内翻墙与15M容量多重交叉审计 🕵️‍♂️ ==="
        ERR=0
        grep -q "CONFIG_TARGET_ath79_generic_DEVICE_glinet_gl-ar300m=y" .config && echo "✓ [DEVICE] 官方 16M 规格机型 Profile 锁死成功" || { echo "❌ [错误] 机型标识符未生效！"; ERR=1; }
        grep -q "CONFIG_PACKAGE_luci-app-passwall=y" .config && echo "✓ [PASSWALL] 图形面板锁定成功" || { echo "❌ [错误] PassWall被剔除！"; ERR=1; }
        grep -q "CONFIG_PACKAGE_Xray-core=y" .config && echo "✓ [CORE] 瘦身版 Xray 核心锁定成功" || { echo "❌ [错误] Xray核心丢失！"; ERR=1; }
        grep -q "CONFIG_XRAY_CORE_COMPRESS_UPX=y" .config && echo "✓ [UPX] Xray 终极体积压缩外挂已激活" || { echo "❌ [严重警告] UPX 压缩未开启，体积必爆仓！"; ERR=1; }
        grep -q "CONFIG_PACKAGE_chinadns-ng=y" .config && echo "✓ [DNS] 国内防污染 ChinaDNS-NG 已就位" || { echo "❌ [错误] 缺少 DNS 分流器，国内上网将大面积瘫痪！"; ERR=1; }
        grep -q "CONFIG_PACKAGE_dnsmasq-full=y" .config && echo "✓ [HIJACK] dnsmasq-full 劫持组件锁定成功" || { echo "❌ [错误] 基础组件不满足！"; ERR=1; }
        
        # 严格拦截多余体积地雷
        if grep -q "CONFIG_PACKAGE_v2ray-geoip=y" .config || grep -q "CONFIG_PACKAGE_v2ray-geosite=y" .config; then
          echo "❌ [严重警告] 检测到巨型数据库入侵！16M 闪存必定爆仓红叉！"
          ERR=1
        else
          echo "✓ [VOLUME] 巨型数据库已彻底清理，15M 容积防线极其稳固"
        fi
        
        if [ $ERR -eq 1 ]; then
          echo "=== ❌ 十重复核未通过！已为你前置熔断！ ==="
          exit 1
        else
          echo "=== 🎉 10次终极审计完美通过！国内防污染翻墙环境与 15M 安全瘦身底盘已锁死！ ==="
        fi

    - name: Download package
      run: |
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      run: |
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s

    - name: Upload firmware to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ImmortalWrt_AR300M16_PassWall_Ultimate
        path: bin/targets/ath79/generic/*-sysupgrade.bin
