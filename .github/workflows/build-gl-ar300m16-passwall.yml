name: Build GL-AR300M16 PassWall Native

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Initialize Compilation Environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get -qq update
        # 强装宿主机工具链（包含 upx-ucl 用于二进制体积原地压缩 60%）
        sudo apt-get install -y build-essential gawk rsync unzip upx-ucl curl git
        sudo bash -c 'bash <(curl -s https://build-scripts.immortalwrt.org/init_build_environment.sh)'

    - name: Update And Install Official Feeds Engine
      run: |
        # 保留官方完好无损的底盘核心源，完美同步 ImmortalWrt 原生集成的 PassWall 及其全套高阶依赖
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Lock Default LAN IP to 192.168.9.1
      run: |
        # 【物理开机锁】利用 uci-defaults 最高脚本指令，开机 100% 强效锁死 192.168.9.1 网段
        mkdir -p package/base-files/files/etc/uci-defaults
        cat << 'EOF' > package/base-files/files/etc/uci-defaults/99-custom-lan-ip
        #!/bin/sh
        uci set network.lan.ipaddr='192.168.9.1'
        uci commit network
        exit 0
        EOF
        chmod +x package/base-files/files/etc/uci-defaults/99-custom-lan-ip

    - name: Generate Core Configuration Matrix
      run: |
        cat << 'EOF' > .config
        # 【机型锁定】精准定位 GL.iNet GL-AR300M 16M NOR 闪存专属 Profile 代号
        CONFIG_TARGET_ath79=y
        CONFIG_TARGET_ath79_generic=y
        CONFIG_TARGET_ath79_generic_DEVICE_glinet_gl-ar300m=y
        
        # 【15M 容量极限压榨】只留纯净中文后台，斩断一切多余多国语言
        CONFIG_PACKAGE_luci=y
        CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
        CONFIG_LUCI_LANG_en=n
        
        # 【核心生命线】强选网页兼容性补丁
        CONFIG_PACKAGE_luci-compat=y
        
        # 【轻量代理归位】选定 ImmortalWrt 官方原生、无冲突的 PassWall 主程序及其中文包
        CONFIG_PACKAGE_luci-app-passwall=y
        CONFIG_PACKAGE_luci-i18n-passwall-zh-cn=y
        
        # 【精简核心策略】锁死唯一精简版 Xray 核心，屏蔽其他全部数MB大小的官方数据库
        CONFIG_PACKAGE_Xray-core=y
        CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Xray=y
        
        # 【国内防污染分流核心：纯C轻量化大件 ChinaDNS-NG 锁死】
        CONFIG_PACKAGE_chinadns-ng=y
        CONFIG_PACKAGE_luci-app-passwall_INCLUDE_ChinaDNS_NG=y
        
        # 【高级劫持平替组件前置锁死】
        CONFIG_PACKAGE_dnsmasq-full=y
        
        # 【终极空间控制】强制剥离所有二进制调试符号，压榨每一KB空间
        CONFIG_STRIP=y
        EOF
        
        # 第一轮基础依赖推导
        make defconfig
        
        # 【无损改写】强制平替默认配置反弹出来的基础 dnsmasq
        sed -i 's/CONFIG_PACKAGE_dnsmasq=y/# CONFIG_PACKAGE_dnsmasq is not set/g' .config
        echo "CONFIG_PACKAGE_dnsmasq-full=y" >> .config
        
        # 第二轮终极锁定推导
        make defconfig

    - name: Early Warning Audit Radar
      run: |
        # 【终极自检雷达】少打包任何一件大件，在此光速自杀
        ERR=0
        grep -q "CONFIG_TARGET_ath79_generic_DEVICE_glinet_gl-ar300m=y" .config && echo "✓ [DEVICE] 官方 16M 机型 Profile 锁死成功" || { echo "❌ [错误] 机型配置偏移"; ERR=1; }
        grep -q "CONFIG_PACKAGE_luci-app-passwall=y" .config && echo "✓ [PASSWALL] 官方原生图形面板锁定成功" || { echo "❌ [错误] PassWall丢失"; ERR=1; }
        grep -q "CONFIG_PACKAGE_Xray-core=y" .config && echo "✓ [CORE] 官方原生 Xray 核心锁定成功" || { echo "❌ [错误] Xray核心丢失"; ERR=1; }
        grep -q "CONFIG_PACKAGE_chinadns-ng=y" .config && echo "✓ [DNS] 官方原生 ChinaDNS-NG 锁定成功" || { echo "❌ [错误] ChinaDNS-NG丢失"; ERR=1; }
        grep -q "CONFIG_PACKAGE_dnsmasq-full=y" .config && echo "✓ [HIJACK] dnsmasq-full 劫持组件锁定成功" || { echo "❌ [错误] dnsmasq-full丢失"; ERR=1; }
        
        if [ $ERR -eq 1 ]; then
          echo "=== ❌ 审计未通过！已为你前置熔断！ ==="
          exit 1
        else
          echo "=== 🎉 零冲突原生审计完美通关！全依赖地基稳如磐石，开始高速编译！ ==="
        fi

    - name: Download Dependency Packages
      run: |
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Execute Core Compilation
      run: |
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s

    - name: Upload Finished Firmware
      uses: actions/upload-artifact@v4
      with:
        name: ImmortalWrt_AR300M16_Native_Perfect
        path: bin/targets/ath79/generic/*-sysupgrade.bin
