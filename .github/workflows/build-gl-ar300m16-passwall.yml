name: Build GL-AR300M16 PassWall Master

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Initialize Compilation Environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get -qq update
        # 强装宿主机工具链（包含 upx-ucl 用于体积压榨，以及解压核心 tools）
        sudo apt-get install -y build-essential gawk rsync unzip upx-ucl curl git
        sudo bash -c 'bash <(curl -s https://build-scripts.immortalwrt.org/init_build_environment.sh)'

    - name: Clone PassWall and Dependencies Safely
      run: |
        # 【5次防断流重试雷达】
        mkdir -p package/
        CLONED=0
        for i in {1..5}; do
          rm -rf /tmp/passwall-repo
          echo "=== 正在尝试第 $i 次拉取 PassWall 核心源码 ==="
          if git clone --depth=1 https://github.com/xiaorouji/openwrt-passwall.git /tmp/passwall-repo; then
            CLONED=1
            break
          fi
          sleep 5
        done
        
        if [ $CLONED -eq 0 ]; then
          echo "❌ 错误：无法连接 GitHub 镜像源，进程中断。"
          exit 1
        fi

        # 【全家桶物理平铺】不仅移动主程序，同时把其自带的 packages 依赖配方全部物理平铺进编译树，100% 杜绝依赖缺失
        cp -r /tmp/passwall-repo/luci-app-passwall package/
        cp -r /tmp/passwall-repo/packages/* package/ 2>/dev/null || true
        echo "✓ PassWall 主面板及全套依赖配方已成功注入本地原生编译区"

    - name: Update And Install Feeds Engine
      run: |
        # 保留官方原装完好无损的底盘核心源，100% 拒绝 Perl 引擎 exit 9 报错
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Lock Default LAN IP to 192.168.9.1
      run: |
        # 【第一守护神：物理开机锁】uci-defaults 最高指令，开机 100% 强效锁死 192.168.9.1 网段
        mkdir -p package/base-files/files/etc/uci-defaults
        cat << 'EOF' > package/base-files/files/etc/uci-defaults/99-custom-lan-ip
        #!/bin/sh
        uci set network.lan.ipaddr='192.168.9.1'
        uci commit network
        exit 0
        EOF
        chmod +x package/base-files/files/etc/uci-defaults/99-custom-lan-ip

    - name: Generate Core Configuration Matrix
      run: |
        cat << 'EOF' > .config
        # 【机型锁定】精准定位 GL.iNet GL-AR300M 16M NOR 闪存专属 Profile 代号
        CONFIG_TARGET_ath79=y
        CONFIG_TARGET_ath79_generic=y
        CONFIG_TARGET_ath79_generic_DEVICE_glinet_gl-ar300m=y
        
        # 【15M 容量极限压榨】只留纯净中文后台，斩断一切多余多国语言
        CONFIG_PACKAGE_luci=y
        CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
        CONFIG_LUCI_LANG_en=n
        
        # 【核心生命线】强选网页兼容性补丁，彻底断绝 PassWall 被系统自动剥离的可能
        CONFIG_PACKAGE_luci-compat=y
        
        # 【轻量代理归位】选定 PassWall 2 主程序与双重命名规范中文语言包
        CONFIG_PACKAGE_luci-app-passwall=y
        CONFIG_PACKAGE_luci-app-passwall_I18n_zh-cn=y
        CONFIG_PACKAGE_luci-i18n-passwall-zh-cn=y
        
        # 【精简核心策略】锁死唯一精简版 Xray 核心，屏蔽其他全部数MB大小的官方数据库
        CONFIG_PACKAGE_Xray-core=y
        CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Xray=y
        
        # 【国内防污染分流核心：纯C轻量化大件 ChinaDNS-NG 锁死】
        CONFIG_PACKAGE_chinadns-ng=y
        CONFIG_PACKAGE_luci-app-passwall_INCLUDE_ChinaDNS_NG=y
        
        # 【高级劫持平替组件前置锁死】
        CONFIG_PACKAGE_dnsmasq-full=y
        
        # 【终极空间控制】强制剥离所有二进制调试符号，压榨每一KB空间
        CONFIG_STRIP=y
        EOF
        
        # 第一轮基础依赖推导
        make defconfig
        
        # 【第二守护神：无损改写】强制平替默认配置反弹出来的基础 dnsmasq
        sed -i 's/CONFIG_PACKAGE_dnsmasq=y/# CONFIG_PACKAGE_dnsmasq is not set/g' .config
        echo "CONFIG_PACKAGE_dnsmasq-full=y" >> .config
        
        # 第二轮终极锁定推导
        make defconfig

    - name: Early Warning Audit Radar
      run: |
        # 【终极自检雷达】少打包任何一件大件、或有配置偏移，在此光速自杀
        ERR=0
        grep -q "CONFIG_TARGET_ath79_generic_DEVICE_glinet_gl-ar300m=y" .config && echo "✓ [DEVICE] 官方 16M 机型 Profile 锁死成功" || { echo "❌ [错误] 机型配置偏移"; ERR=1; }
        grep -q "CONFIG_PACKAGE_luci-app-passwall=y" .config && echo "✓ [PASSWALL] 图形面板锁定成功" || { echo "❌ [错误] PassWall丢失"; ERR=1; }
        grep -q "CONFIG_PACKAGE_Xray-core=y" .config && echo "✓ [CORE] 瘦身版 Xray 核心锁定成功" || { echo "❌ [错误] Xray核心丢失"; ERR=1; }
        grep -q "CONFIG_PACKAGE_chinadns-ng=y" .config && echo "✓ [DNS] 国内防污染 ChinaDNS-NG 锁定成功" || { echo "❌ [错误] ChinaDNS-NG丢失"; ERR=1; }
        grep -q "CONFIG_PACKAGE_dnsmasq-full=y" .config && echo "✓ [HIJACK] dnsmasq-full 劫持组件锁定成功" || { echo "❌ [错误] dnsmasq-full丢失"; ERR=1; }
        
        if [ $ERR -eq 1 ]; then
          echo "=== ❌ 审计未通过！已为你前置熔断！ ==="
          exit 1
        else
          echo "=== 🎉 终极验证完美通关！全依赖地基稳如磐石，开始高速编译！ ==="
        fi

    - name: Download Dependency Packages
      run: |
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Execute Core Compilation
      run: |
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s

    - name: Upload Finished Firmware
      uses: actions/upload-artifact@v4
      with:
        name: ImmortalWrt_AR300M16_Firmware
        path: bin/targets/ath79/generic/*-sysupgrade.bin
