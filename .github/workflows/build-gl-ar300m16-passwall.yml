name: Build GL-AR300M16 PassWall Standard

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04 # 强制锁定稳定的 22.04 版本，隔绝底层环境变动引发的兼容性故障

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Initialize Compilation Environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        # 【修复 Exit 100 致命错误】：彻底删除所有手动 apt-get 命令！
        # 直接调用 ImmortalWrt 官方维护的自适应环境部署脚本，它会自动处理所有底层包名更替！
        sudo bash -c 'bash <(curl -s https://build-scripts.immortalwrt.org/init_build_environment.sh)'
        # 仅安全地补充一个 upx 压缩工具，用于最后给固件瘦身
        sudo apt-get -qq update && sudo apt-get install -y upx || true

    - name: Add PassWall Feeds
      run: |
        # 回归官方最标准的 feeds 添加方式
        echo "src-git passwall https://github.com/xiaorouji/openwrt-passwall.git;main" >> feeds.conf.default
        echo "src-git passwall_packages https://github.com/xiaorouji/openwrt-passwall-packages.git;main" >> feeds.conf.default

    - name: Update And Install Feeds
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Configure Network and Build Matrix
      run: |
        # 稳妥修改 LAN IP 为 192.168.9.1
        sed -i 's/192.168.1.1/192.168.9.1/g' package/base-files/files/bin/config_generate
        
        # 生成标准配置单
        cat << 'EOF' > .config
        CONFIG_TARGET_ath79=y
        CONFIG_TARGET_ath79_generic=y
        CONFIG_TARGET_ath79_generic_DEVICE_glinet_gl-ar300m=y
        
        # 基础 UI 与中文包
        CONFIG_PACKAGE_luci=y
        CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
        CONFIG_PACKAGE_luci-compat=y
        CONFIG_LUCI_LANG_en=n
        
        # PassWall 及中文包
        CONFIG_PACKAGE_luci-app-passwall=y
        CONFIG_PACKAGE_luci-i18n-passwall-zh-cn=y
        
        # 仅保留 Xray 核心，彻底屏蔽臃肿模块以节省 16M 空间
        CONFIG_PACKAGE_Xray-core=y
        CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Xray=y
        CONFIG_PACKAGE_luci-app-passwall_INCLUDE_sing-box=n
        CONFIG_PACKAGE_luci-app-passwall_INCLUDE_V2ray=n
        CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Trojan_Plus=n
        
        # DNS 与网络基础 (开启 ChinaDNS-NG 防污染)
        CONFIG_PACKAGE_chinadns-ng=y
        CONFIG_PACKAGE_dnsmasq-full=y
        CONFIG_PACKAGE_dnsmasq=n
        
        # 强制移除庞大的地理数据库，防爆仓
        CONFIG_PACKAGE_v2ray-geoip=n
        CONFIG_PACKAGE_v2ray-geosite=n
        
        # 强制剥离无用代码，压缩体积
        CONFIG_STRIP=y
        EOF
        
        # 执行默认配置推导
        make defconfig

    - name: Download Packages
      run: |
        # 提前下载所有依赖包，减少编译过程中的网络报错
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile Firmware
      run: |
        # 启动多线程编译，若多线程报错则自动切单线程输出详细错误日志
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 V=s

    - name: Upload Finished Firmware
      uses: actions/upload-artifact@v4
      with:
        name: ImmortalWrt_AR300M16_Firmware
        path: bin/targets/ath79/generic/*-sysupgrade.bin
