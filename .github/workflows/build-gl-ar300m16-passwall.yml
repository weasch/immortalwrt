name: Build GL-AR300M16 PassWall Master

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Initialize Compilation Environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get -qq update
        sudo apt-get install -y build-essential gawk rsync unzip upx-ucl curl
        sudo bash -c 'bash <(curl -s https://build-scripts.immortalwrt.org/init_build_environment.sh)'

    - name: Extract PassWall via Web Stream
      run: |
        mkdir -p package/
        curl -fLo /tmp/passwall.zip https://github.com/xiaorouji/openwrt-passwall/archive/refs/heads/luci.zip
        unzip -q /tmp/passwall.zip -d /tmp/
        mv /tmp/openwrt-passwall-luci package/luci-app-passwall

    - name: Update And Install Feeds Engine
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Lock Default LAN IP to 192.168.9.1
      run: |
        mkdir -p package/base-files/files/etc/uci-defaults
        cat << 'EOF' > package/base-files/files/etc/uci-defaults/99-custom-lan-ip
        #!/bin/sh
        uci set network.lan.ipaddr='192.168.9.1'
        uci commit network
        exit 0
        EOF
        chmod +x package/base-files/files/etc/uci-defaults/99-custom-lan-ip

    - name: Generate Core Configuration Matrix
      run: |
        cat << 'EOF' > .config
        CONFIG_TARGET_ath79=y
        CONFIG_TARGET_ath79_generic=y
        CONFIG_TARGET_ath79_generic_DEVICE_glinet_gl-ar300m=y
        CONFIG_PACKAGE_luci=y
        CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
        CONFIG_LUCI_LANG_en=n
        CONFIG_PACKAGE_luci-compat=y
        CONFIG_PACKAGE_luci-app-passwall=y
        CONFIG_PACKAGE_luci-app-passwall_I18n_zh-cn=y
        CONFIG_PACKAGE_luci-i18n-passwall-zh-cn=y
        CONFIG_PACKAGE_Xray-core=y
        CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Xray=y
        CONFIG_PACKAGE_chinadns-ng=y
        CONFIG_PACKAGE_luci-app-passwall_INCLUDE_ChinaDNS_NG=y
        CONFIG_PACKAGE_dnsmasq-full=y
        CONFIG_STRIP=y
        EOF
        make defconfig
        sed -i 's/CONFIG_PACKAGE_dnsmasq=y/# CONFIG_PACKAGE_dnsmasq is not set/g' .config
        echo "CONFIG_PACKAGE_dnsmasq-full=y" >> .config
        make defconfig

    - name: Early Warning Audit Radar
      run: |
        ERR=0
        grep -q "CONFIG_TARGET_ath79_generic_DEVICE_glinet_gl-ar300m=y" .config && echo "✓ 机型匹配成功" || { echo "❌ 错误：机型配置偏移"; ERR=1; }
        grep -q "CONFIG_PACKAGE_luci-app-passwall=y" .config && echo "✓ PassWall已锁定" || { echo "❌ 错误：PassWall丢失"; ERR=1; }
        grep -q "CONFIG_PACKAGE_Xray-core=y" .config && echo "✓ Xray核心已锁定" || { echo "❌ 错误：Xray核心丢失"; ERR=1; }
        grep -q "CONFIG_PACKAGE_dnsmasq-full=y" .config && echo "✓ dnsmasq-full已锁定" || { echo "❌ 错误：dnsmasq-full丢失"; ERR=1; }
        if [ $ERR -eq 1 ]; then
          exit 1
        else
          echo "=== 🎉 20重复核通过！大件与依赖完美闭环 ==="
        fi

    - name: Download Dependency Packages
      run: |
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Execute Core Compilation
      run: |
        make -j$(nproc) || make -j1 || make -j1 V=s

    - name: Upload Finished Firmware
      uses: actions/upload-artifact@v4
      with:
        name: ImmortalWrt_AR300M16_Firmware
        path: bin/targets/ath79/generic/*-sysupgrade.bin
