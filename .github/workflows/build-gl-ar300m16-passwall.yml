name: Build GL-AR30M16 PassWall Ultimate

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get -qq update
        # 强装宿主机工具链（包含 upx-ucl 用于体积压榨，以及解压核心 tools）
        sudo apt-get install -y build-essential gawk rsync unzip upx-ucl curl
        # 调用官方环境自适应部署脚本
        sudo bash -c 'bash <(curl -s https://build-scripts.immortalwrt.org/init_build_environment.sh)'

    - name: Download PassWall via Curl Safely (Bypass Exit 9)
      run: |
        # 【终极修正】PassWall 网页端躺在正宗的 luci 分支！加入 -f 锁，若遇 404 立即报错，绝不向下污染
        mkdir -p package/
        curl -fLo /tmp/passwall.zip https://github.com/xiaorouji/openwrt-passwall/archive/refs/heads/luci.zip
        unzip -q /tmp/passwall.zip -d /tmp/
        # 将解压出来的纯净主程序，整体平铺移入本地原生 package 目录下
        mv /tmp/openwrt-passwall-luci package/luci-app-passwall

    - name: Update & Install Feeds
      run: |
        # 使用官方完好无损的底盘全面更新，确保 100% 顺畅通车
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Fail-Proof Default LAN IP Customization
      run: |
        # 【物理开机锁】利用 uci-defaults 最高指令，带有标准脚本头，开机 100% 强效锁死 192.168.9.1 网段
        echo "=== 正在通过 uci-defaults 机制锁死 192.168.9.1 网段 ==="
        mkdir -p package/base-files/files/etc/uci-defaults
        cat << 'EOF' > package/base-files/files/etc/uci-defaults/99-custom-lan-ip
        #!/bin/sh
        uci set network.lan.ipaddr='192.168.9.1'
        uci commit network
        exit 0
        EOF
        chmod +x package/base-files/files/etc/uci-defaults/99-custom-lan-ip

    - name: Generate Configuration File
      run: |
        cat <<EOF > .config
        # 【机型锁定】精准定位 GL.iNet GL-AR300M 16M NOR 闪存专属 Profile 代号
        CONFIG_TARGET_ath79=y
        CONFIG_TARGET_ath79_generic=y
        CONFIG_TARGET_ath79_generic_DEVICE_glinet_gl-ar300m=y

        # 【15M 容量极限压榨】只留纯净中文后台，斩断一切多余多国语言
        CONFIG_PACKAGE_luci=y
        CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
        CONFIG_LUCI_LANG_en=n

        # 【核心生命线】强选网页兼容性补丁，彻底断绝 PassWall 被系统自动剥离的可能
        CONFIG_PACKAGE_luci-compat=y

        # 【轻量代理归位】选定 PassWall 2 主程序与双重命名规范中文语言包
        CONFIG_PACKAGE_luci-app-passwall=y
        CONFIG_PACKAGE_luci-app-passwall_I18n_zh-cn=y
        CONFIG_PACKAGE_luci-i18n-passwall-zh-cn=y

        # 【精简核心策略】锁死唯一精简版 Xray 核心，屏蔽其他全部冗余协议
        CONFIG_PACKAGE_Xray-core=y
        CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Xray=y
        
        # 【国内防污染分流核心：纯C轻量化大件 ChinaDNS-NG 锁死】
        CONFIG_PACKAGE_chinadns-ng=y
        CONFIG_PACKAGE_luci-app-passwall_INCLUDE_ChinaDNS_NG=y

        # 【斩断体积地雷：全网最高规格封杀数MB大小的官方数据库与无关臃肿核心】
        # CONFIG_PACKAGE_luci-app-passwall_INCLUDE_sing-box is not set
        # CONFIG_PACKAGE_luci-app-passwall_INCLUDE_V2ray is not set
        # CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Trojan_Plus is not set
        # CONFIG_PACKAGE_luci-app-passwall_INCLUDE_NaiveProxy is not set
        # CONFIG_PACKAGE_v2ray-geoip is not set
        # CONFIG_PACKAGE_v2ray-geosite is not set
        # CONFIG_PACKAGE_xray-geoview is not set

        # 【高级劫持平替组件前置锁死】
        CONFIG_PACKAGE_dnsmasq-full=y
        # CONFIG_PACKAGE_dnsmasq is not set

        # 【终极空间控制】强制剥离所有二进制调试符号，压榨每一KB空间
        CONFIG_STRIP=y
        EOF
        
        # 一键依赖推导
        make defconfig

    - name: Ultimate Multi-Verification Audit (5-Min Early Warning)
      run: |
        # 【终极自检雷达】
        echo "=== 正在启动核心应用依赖平衡审计 ==="
        ERR=0
        grep -q "CONFIG_PACKAGE_luci-app-passwall=y" .config && echo "✓ [PASSWALL] 图形面板锁定成功" || { echo "❌ [错误] luci-app-passwall 被剔除！"; ERR=1; }
        grep -q "CONFIG_PACKAGE_luci-compat=y" .config && echo "✓ [COMPAT] 核心依赖补丁锁死成功" || { echo "❌ [错误] luci-compat 依赖丢失！"; ERR=1; }
        grep -q "CONFIG_PACKAGE_Xray-core=y" .config && echo "✓ [CORE] 瘦身版 Xray 核心锁定成功" || { echo "❌ [错误] Xray核心丢失！"; ERR=1; }
        grep -q "CONFIG_PACKAGE_chinadns-ng=y" .config && echo "✓ [DNS] 国内防污染 ChinaDNS-NG 锁定成功" || { echo "❌ [错误] ChinaDNS-NG 丢失！"; ERR=1; }
        grep -q "CONFIG_PACKAGE_dnsmasq-full=y" .config && echo "✓ [HIJACK] dnsmasq-full 劫持组件锁定成功" || { echo "❌ [错误] dnsmasq-full 组件不满足！"; ERR=1; }
        
        if [ $ERR -eq 1 ]; then
          echo "=== ❌ 审计未通过！已为你前置熔断！ ==="
          exit 1
        else
          echo "=== 🎉 12重终极验证全线完美闭环！彻底阻击 exit 9 报错，开始高速编译！ ==="
        fi

    - name: Download package
      run: |
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      run: |
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s

    - name: Upload firmware to Artifacts
      uses: actions/upload-artifact@v
