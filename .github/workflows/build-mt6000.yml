name: Build GL-MT6000 Ultimate Perfect

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get -qq update
        # 强装宿主机内核编译基础大件（包含 dwarves 里的 pahole 用于生成 BTF 视神经）
        sudo apt-get install -y dwarves clang llvm libelf-dev build-essential gawk rsync unzip nodejs npm
        # 强行锁定 pnpm v9，完美避开最新社区 v10 环境下前端 lockfile 锁版本冲突闪退的 Bug
        sudo npm install -g pnpm@9
        # 调用官方环境自适应部署脚本
        sudo bash -c 'bash <(curl -s https://build-scripts.immortalwrt.org/init_build_environment.sh)'

    - name: Setup Modern Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Clone Custom Packages (Daed & OpenClash)
      run: |
        # 【第1轮审计修正：大件扁平化平铺，断绝目录过深导致的包遗漏】
        git clone --depth=1 https://github.com/QiuSimons/luci-app-daed /tmp/daed-repo
        mv /tmp/daed-repo/daed package/
        mv /tmp/daed-repo/luci-app-daed package/
        
        # 【OpenClash 扁平化提取】
        git clone --depth=1 https://github.com/vernesong/OpenClash.git /tmp/openclash-repo
        mv /tmp/openclash-repo/luci-app-openclash package/

    - name: Force Drop Duplicate Dnsmasq
      run: |
        # 【第2轮审计修正：物理超度基础版 dnsmasq 源码，彻底解决 defconfig 依赖反弹冲突】
        rm -rf package/network/services/dnsmasq

    - name: Update & Install Feeds
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Deep Inject Kernel Options for eBPF/BTF/XDP
      run: |
        # 【物理注入】精准爆破通用层与 Mediatek/Filogic 家族底盘的每一个内核模版
        echo "=== 正在向内核底盘物理注入 eBPF/BTF 核心参数 ==="
        find target/linux/generic/ target/linux/mediatek/ -name "config-*" | while read -r file; do
          if [ -f "$file" ]; then
            echo -e "\nCONFIG_DEBUG_INFO=y\nCONFIG_DEBUG_INFO_REDUCED=n\nCONFIG_DEBUG_INFO_BTF=y\nCONFIG_BPF_SYSCALL=y\nCONFIG_BPF_JIT=y\nCONFIG_CGROUP_BPF=y\nCONFIG_XDP_SOCKETS=y\nCONFIG_XDP_SOCKETS_DIAG=m" >> "$file"
          fi
        done

    - name: Customize Default LAN IP
      run: |
        # 【出厂网段篡改】直接将源码层面的默认网段死死锁在你指定的 192.168.8.1
        echo "=== 正在改写默认 LAN 网段为 192.168.8.1/24 ==="
        sed -i 's/192.168.1.1/192.168.8.1/g' package/base-files/files/bin/config_generate

    - name: Generate Configuration File
      run: |
        cat <<EOF > .config
        # 【架构锁定】锁定官方正宗 GL.iNet GL-MT6000 专属顶级平台
        CONFIG_TARGET_mediatek=y
        CONFIG_TARGET_mediatek_filogic=y
        CONFIG_TARGET_mediatek_filogic_DEVICE_glinet_gl-mt6000=y

        # 解锁顶层高级内核控制权限与组件控制链
        CONFIG_DEVEL=y
        CONFIG_ADVANCED_OPTIONS=y
        CONFIG_KERNEL_DEBUG_INFO=y
        CONFIG_KERNEL_DEBUG_INFO_REDUCED=n
        CONFIG_KERNEL_DEBUG_INFO_BTF=y
        CONFIG_KERNEL_CGROUPS=y
        CONFIG_KERNEL_CGROUP_BPF=y
        CONFIG_KERNEL_BPF_EVENTS=y
        CONFIG_BPF_TOOLCHAIN_HOST=y
        CONFIG_KERNEL_XDP_SOCKETS=y

        # 强选底层网络与虚拟化核心驱动
        CONFIG_PACKAGE_kmod-bpf=y
        CONFIG_PACKAGE_kmod-veth=y
        CONFIG_PACKAGE_kmod-tun=y
        CONFIG_PACKAGE_kmod-xdp-sockets-diag=y

        # 强选私有编译 Daed 核心、控制面板及中文包
        CONFIG_PACKAGE_daed=y
        CONFIG_PACKAGE_luci-app-daed=y
        CONFIG_PACKAGE_luci-i18n-daed-zh-cn=y

        # 强选 OpenClash 及其核心配套大件（【第3轮修正】补齐 TUN 核心包与网页兼容补丁）
        CONFIG_PACKAGE_luci-app-openclash=y
        CONFIG_PACKAGE_luci-compat=y
        CONFIG_PACKAGE_dnsmasq-full=y
        CONFIG_PACKAGE_ip-full=y
        CONFIG_PACKAGE_coreutils-nohup=y
        CONFIG_PACKAGE_bash=y
        CONFIG_PACKAGE_curl=y
        CONFIG_PACKAGE_ca-bundle=y
        CONFIG_PACKAGE_libustream-openssl=y

        # 强选基础 LuCI 网页后台及中文包
        CONFIG_PACKAGE_luci=y
        CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
        EOF
        
        # 依赖锁死推导
        make defconfig

    - name: Ultimate Multi-Verification Audit (5-Min Early Warning)
      run: |
        # 【双代理三重交叉雷达审计】少打包任何一件大件，直接前置熔断自杀，绝不让你白等两个半小时！
        echo "=== 🕵️‍♂️ 正在启动终极多重交叉验证雷达 🕵️‍♂️ ==="
        ERR=0
        
        # 验证 Daed 侧
        grep -q "CONFIG_PACKAGE_luci-app-daed=y" .config && echo "✓ [DAED] 图形面板已成功锁死清单" || { echo "❌ [错误] luci-app-daed 被剥离！"; ERR=1; }
        grep -q "CONFIG_PACKAGE_daed=y" .config && echo "✓ [DAED] 核心二进制已成功锁死清单" || { echo "❌ [错误] daed 核心被剥离！"; ERR=1; }
        grep -q "CONFIG_PACKAGE_kmod-xdp-sockets-diag=y" .config && echo "✓ [DAED] 底层内核 XDP 驱动已就位" || { echo "❌ [错误] XDP 驱动依赖不通过！"; ERR=1; }
        
        # 验证 OpenClash 侧
        grep -q "CONFIG_PACKAGE_luci-app-openclash=y" .config && echo "✓ [CLASH] OpenClash 主程序已成功锁死清单" || { echo "❌ [错误] OpenClash 被剥离！"; ERR=1; }
        grep -q "CONFIG_PACKAGE_luci-compat=y" .config && echo "✓ [CLASH] 网页菜单兼容补丁已成功锁死清单" || { echo "❌ [错误] 缺失兼容补丁，刷入后菜单将隐形！"; ERR=1; }
        grep -q "CONFIG_PACKAGE_dnsmasq-full=y" .config && echo "✓ [CLASH] 高阶高级劫持组件 dnsmasq-full 已就位" || { echo "❌ [错误] 核心劫持组件未满足！"; ERR=1; }

        if [ $ERR -eq 1 ]; then
          echo "=== ❌ 终极审计未通过！已为你前置熔断，拒绝产出空壳固件！ ==="
          exit 1
        else
          echo "=== 🎉 终极多重复核通过！大件全部锁死！自定义 192.168.8.1 网段已准备就绪！请安心等待大作诞生 ==="
        fi

    - name: Download package
      run: |
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      run: |
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s

    - name: Upload firmware to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ImmortalWrt_MT6000_Ultimate_Perfect_Firmware
        # 【第5轮修正：全局深层扫尾】100% 抓取到生成的 sysupgrade.bin 固件
        path: bin/targets/**/*.bin
