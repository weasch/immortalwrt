name: Build ImmortalWrt for AX6S

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz mkisofs nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools qemu-utils rsync sstream swig time u-boot-tools libtool-bin xz-utils zlib1g-dev libinih-dev
        sudo -E apt-get -qq clean

    - name: Update & Install Feeds
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Generate Configuration File
      run: |
        cat <<EOF > .config
        CONFIG_TARGET_mediatek=y
        CONFIG_TARGET_mediatek_mt7622=y
        CONFIG_TARGET_mediatek_mt7622_DEVICE_xiaomi_redmi-router-ax6s=y

        # 开启底层 BTF 视神经
        CONFIG_DEVEL=y
        CONFIG_KERNEL_BPF_EVENTS=y
        CONFIG_KERNEL_CGROUP_BPF=y
        CONFIG_BPF_SYSCALL=y
        CONFIG_DEBUG_INFO_BTF=y

        # 编译打包入 Daed
        CONFIG_PACKAGE_daed=y
        CONFIG_PACKAGE_luci-app-daed=y
        EOF
        make defconfig

    - name: Download package
      run: |
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      run: |
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s

    - name: Upload firmware to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ImmortalWrt_AX6S_Daed
        path: bin/targets/mediatek/mt7622/*.bin
