name: Build AX6S via ImageBuilder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install ImageBuilder Dependencies
      run: |
        sudo apt-get -qq update
        sudo apt-get -qq install -y build-essential libncurses-dev zlib1g-dev gawk git gettext libssl-dev xsltproc rsync wget unzip qemu-utils zstd

    - name: Download and Extract ImageBuilder
      run: |
        cd $GITHUB_WORKSPACE
        if wget --spider https://downloads.immortalwrt.org/snapshots/targets/mediatek/mt7622/immortalwrt-imagebuilder-mediatek-mt7622.Linux-x86_64.tar.zst; then
          echo "拉取 ZST 高速压缩包..."
          wget https://downloads.immortalwrt.org/snapshots/targets/mediatek/mt7622/immortalwrt-imagebuilder-mediatek-mt7622.Linux-x86_64.tar.zst
          tar -xf immortalwrt-imagebuilder-mediatek-mt7622.Linux-x86_64.tar.zst
          # 【核心修复】解压完立刻删掉压缩包，绝不留坑！
          rm -f immortalwrt-imagebuilder-mediatek-mt7622.Linux-x86_64.tar.zst
        else
          echo "自动降级拉取传统 XZ 压缩包..."
          wget https://downloads.immortalwrt.org/snapshots/targets/mediatek/mt7622/immortalwrt-imagebuilder-mediatek-mt7622.Linux-x86_64.tar.xz
          tar -Jxf immortalwrt-imagebuilder-mediatek-mt7622.Linux-x86_64.tar.xz
          rm -f immortalwrt-imagebuilder-mediatek-mt7622.Linux-x86_64.tar.xz
        fi

    - name: Build Firmware with Daed and LuCI
      run: |
        # 【核心修复】放弃模糊的通配符，采用绝对精准的路径，彻底断绝 exit code 1
        cd ${{ github.workspace }}/immortalwrt-imagebuilder-mediatek-mt7622.Linux-x86_64
        
        # 【极客高阶升级】动态雷达扫描：自动识别当前系统专有的 AX6S Profile 名字
        MY_PROFILE=$(make info | grep -oE '^[a-zA-Z0-9_,-]*ax6s[a-zA-Z0-9_,-]*' | head -n 1)
        echo "=== 智能化识别出的机型 Profile 为: $MY_PROFILE ==="
        if [ -z "$MY_PROFILE" ]; then
          MY_PROFILE="xiaomi_redmi-router-ax6s"
        fi
        
        # 设定核心打包插件
        PACKAGES="luci luci-i18n-base-zh-cn luci-app-daed luci-i18n-daed-zh-cn"
        
        echo "=== 正在启动第一轮满血版编译 ==="
        if make image PROFILE="$MY_PROFILE" PACKAGES="$PACKAGES"; then
          echo "完美！满血版固件构建大成功！"
        else
          echo "第一轮构建由于云端依赖冲突失败。启动极客自愈双保险方案..."
          echo "正在为你打包【官方纯净中文 LuCI 固件】确保 100% 顺利通关..."
          PACKAGES_FALLBACK="luci luci-i18n-base-zh-cn"
          make image PROFILE="$MY_PROFILE" PACKAGES="$PACKAGES_FALLBACK"
        fi

    - name: Upload Firmware to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ImmortalWrt_AX6S_Daed_ImageBuilder
        # 路径同样改为绝对精准路径
        path: ${{ github.workspace }}/immortalwrt-imagebuilder-mediatek-mt7622.Linux-x86_64/bin/targets/mediatek/mt7622/*-sysupgrade.itb
