name: Build ImmortalWrt for AX6S

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get -qq update
        # 直接使用 ImmortalWrt 官方的环境自适应脚本，告别手动装包冲突！
        sudo bash -c 'bash <(curl -s https://build-scripts.immortalwrt.org/init_build_environment.sh)'

    - name: Update & Install Feeds
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Generate Configuration File
      run: |
        cat <<EOF > .config
        CONFIG_TARGET_mediatek=y
        CONFIG_TARGET_mediatek_mt7622=y
        CONFIG_TARGET_mediatek_mt7622_DEVICE_xiaomi_redmi-router-ax6s=y

        # 开启底层 BTF 视神经
        CONFIG_DEVEL=y
        CONFIG_KERNEL_BPF_EVENTS=y
        CONFIG_KERNEL_CGROUP_BPF=y
        CONFIG_BPF_SYSCALL=y
        CONFIG_DEBUG_INFO_BTF=y

        # 编译打包入 Daed
        CONFIG_PACKAGE_daed=y
        CONFIG_PACKAGE_luci-app-daed=y
        EOF
        make defconfig

    - name: Download package
      run: |
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      run: |
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s

    - name: Upload firmware to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ImmortalWrt_AX6S_Daed
        # 直接把整个 mt7622 目录打包，确保不会遗漏任何固件文件
        path: bin/targets/mediatek/mt7622/*
